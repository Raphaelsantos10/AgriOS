name: FARPHA CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: farpha-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Testes, lint e build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Obter código
        uses: actions/checkout@v7

      - name: Preparar Node.js
        uses: actions/setup-node@v7
        with:
          node-version-file: frontend/.nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: Auditar dependências de produção
        run: npm run audit:prod

      - name: Executar validação completa
        run: npm run validate

      - name: Guardar build de produção
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: farpha-production-${{ github.sha }}
          path: frontend/dist
          if-no-files-found: error
          retention-days: 14
          compression-level: 9
