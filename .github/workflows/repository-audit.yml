name: FARPHA Repository Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "41 5 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: farpha-repository-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repository:
    name: Integridade, histórico e segredos
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Obter código e histórico
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Preparar Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: frontend/.nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependências verificadas
        run: npm ci

      - name: Verificar integridade do repositório
        run: npm run verify:repository

      - name: Auditar dependências de produção
        run: npm run audit:prod
