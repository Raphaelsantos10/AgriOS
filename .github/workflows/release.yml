name: FARPHA Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: farpha-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Validar e empacotar release
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Obter código
        uses: actions/checkout@v4

      - name: Preparar Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: frontend/.nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: Confirmar versão da tag
        run: npm run check:release -- "${GITHUB_REF_NAME}"

      - name: Auditar dependências de produção
        run: npm run audit:prod

      - name: Validar release completa
        run: npm run validate

      - name: Guardar pacote da release
        uses: actions/upload-artifact@v4
        with:
          name: farpha-release-${{ github.ref_name }}
          path: frontend/dist
          if-no-files-found: error
          retention-days: 30
          compression-level: 9
